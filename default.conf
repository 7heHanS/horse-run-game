server {
    listen 80;
    server_name _; # 모든 도메인/IP 요청 수용

    root /usr/share/nginx/html;
    index index.html index.htm;

    # 1. 파비콘 및 robots.txt 노이즈 완벽 제거 (디스크 I/O 절약)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # 2. 악성 취약점 스캐너 원천 차단 (444 응답으로 TCP 세션 즉시 종료)
    # 로그에 찍혔던 경로나 봇들이 자주 찾는 경로를 정규식으로 묶어버립니다.
    location ~* ^/(vendor|geoserver|_ignition|HNAP1|Autodiscover|console|actuator|securityRealm|cgi-bin|manage|admin) {
        return 444;
    }

    # 현재 앱과 무관한 백엔드 스크립트/설정 파일 요청 차단
    location ~* \.(php|jsp|cgi|env|xml|sh|sql)$ {
        return 444;
    }

    # 2.5 숨김 파일(.git, .env 등) 접근 원천 차단
    location ~ /\. {
        return 444; # 혹은 deny all;
    }

    # 3. 정상 트래픽 처리 (SPA 라우팅 지원)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
