<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>말 달리자 (Horse Run)</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <header>
      <h1>말 달리자</h1>
      <div class="status-bar" id="status-bar">플레이어 1의 턴입니다</div>
    </header>
    <main>
      <div id="game-board" class="board"></div>
    </main>
    <aside class="controls">
            <div class="control-group">
                <label for="difficulty">AI 난이도:</label>
                <select id="difficulty">
                    <option value="1">하 (탐색 깊이 1)</option>
                    <option value="2">중 (탐색 깊이 2)</option>
                    <option value="3" selected>상 (탐색 깊이 3)</option>
                    <option value="4">최상 (탐색 깊이 4)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="use-ml">
                    <input type="checkbox" id="use-ml" />
                    딥러닝 AI 사용 (PyTorch)
                </label>
            </div>
            <button id="reset-btn">게임 재시작</button>
    </aside>

    <div id="replay-controls" class="hidden">
      <button id="prev-btn">◀ 이전 수</button>
      <span id="replay-status">0 / 0</span>
      <button id="next-btn">다음 수 ▶</button>
      <button id="exit-replay-btn">복기 종료</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
