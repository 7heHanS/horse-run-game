<body>
  <div id="app">
    <header>
      <h1>말 달리자</h1>
      <div class="status-bar" id="status-bar">플레이어 1의 턴입니다</div>
    </header>
    <main>
      <div id="game-board" class="board"></div>

    <aside class="controls">

          <option value="4">고수 (4수 예측)</option>
          <option value="5">마스터 (5수 예측)</option>
        </select>
      </div>
      <button id="reset-btn">게임 재시작</button>
    </aside>
  </div>
